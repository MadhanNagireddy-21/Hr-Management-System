services:
  # ==========================================
  # Spring Boot Backend API Service (AWS Production)
  # ==========================================
  backend:
    build:
      context: ./backend/hrms
      dockerfile: Dockerfile
    container_name: hrms-backend
    restart: always
    env_file:
      - .env
    # Only expose port 8080 to the internal Docker network (Nginx communicates with it securely)
    expose:
      - "8080"
    networks:
      - hrms-network

  # ==========================================
  # Nginx Reverse Proxy Service (Option 2 Production Architecture)
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: hrms-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - hrms-network

networks:
  hrms-network:
    name: hrms_network
    driver: bridge
