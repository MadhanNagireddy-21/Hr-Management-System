name: Frontend CI/CD

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js Production App
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync ./out s3://hr-management-system-frontend-64fqj6pp/ --delete

      - name: Invalidate CloudFront Cache
        run: aws cloudfront create-invalidation --distribution-id E2QCPRK45LRQB2 --paths "/*"

      - name: Pre-warm CloudFront Cache
        run: |
          echo "Waiting 10 seconds for CloudFront to invalidate..."
          sleep 10
          echo "Pre-warming the cache for Indian users..."
          curl -s -o /dev/null https://hrms.saitejainfotechprivatelimited.com/
          curl -s -o /dev/null https://hrms.saitejainfotechprivatelimited.com/login/employee
          curl -s -o /dev/null https://hrms.saitejainfotechprivatelimited.com/login/admin
          echo "Cache is warm!"
