name: Backend CI/CD

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'backend/**'
      - 'nginx/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/backend-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 Instance
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # If the repository doesn't exist on this new server, clone it!
            if [ ! -d "Hr-Management-System" ]; then
              git clone https://github.com/xyushman/Hr-Management-System.git || echo "Make sure your repo is public, or clone it manually once!"
            fi
            cd Hr-Management-System
            
            # Switch to the correct branch based on what triggered this action
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            
            # Copy the secure environment variables generated by Terraform
            sudo cp /opt/hrms/.env ./.env
            
            # 🔴 FIX FOR TiDB: Inject useServerPrepStmts=false and serverTimezone=UTC into the JDBC URL 
            sudo sed -i 's/tlsVersions=TLSv1.2,TLSv1.3/tlsVersions=TLSv1.2,TLSv1.3\&useServerPrepStmts=false\&serverTimezone=UTC/g' ./.env
            
            # Restart the Docker containers with the new code
            sudo docker compose -f docker-compose.prod.yml up -d --build
